{% extends "base.html" %}
{% block title %}Register — LibraryMS{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card card card-static animate-fade-in-up">
    <div class="card-body">
      <div class="auth-header">
        <div style="font-size: 2.5rem; margin-bottom: var(--space-4);">🚀</div>
        <h2>Create your account</h2>
        <p>Join the library and start borrowing books</p>
      </div>

      {% if error %}
      <div class="alert alert-error" role="alert">
        <span>{{ error }}</span>
        <button class="alert-dismiss" onclick="this.parentElement.remove()" aria-label="Dismiss">&times;</button>
      </div>
      {% endif %}

      <form method="POST" action="/register" id="register-form">
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <input
            type="text"
            name="username"
            id="username"
            class="form-input"
            placeholder="Choose a username"
            value="{{ username or '' }}"
            required
            minlength="3"
            autocomplete="username"
            autofocus
            aria-required="true"
          >
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            name="password"
            id="password"
            class="form-input"
            placeholder="Choose a password"
            required
            minlength="4"
            autocomplete="new-password"
            aria-required="true"
          >
          <p class="form-help">Must be at least 4 characters</p>
        </div>

        <div class="form-group">
          <label for="password_confirm" class="form-label">Confirm Password</label>
          <input
            type="password"
            name="password_confirm"
            id="password_confirm"
            class="form-input"
            placeholder="Re-enter your password"
            required
            autocomplete="new-password"
            aria-required="true"
          >
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block mt-4" id="register-submit">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
