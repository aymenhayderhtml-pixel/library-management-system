{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<section class="auth">
  <div class="auth-card">
    <h2>Create account</h2>
    {% with msg = request.args.get('msg') %}{% if msg %}
      <div class="alert alert-{{ request.args.get('msg_type', 'info') }}">{{ msg }}</div>
    {% endif %}{% endwith %}
    <form method="POST" action="/register" hx-post="/register" hx-swap="none" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" name="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" type="submit">Register</button>
        <span class="form-footer">Already have an account? <a href="/login">Login</a></span>
      </div>
    </form>
  </div>
</section>
{% endblock %}
