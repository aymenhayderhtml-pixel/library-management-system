{% extends "base.html" %}
{% block title %}Login — LibraryMS{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card card card-static animate-fade-in-up">
    <div class="card-body">
      <div class="auth-header">
        <div style="font-size: 2.5rem; margin-bottom: var(--space-4);">👋</div>
        <h2>Welcome back</h2>
        <p>Sign in to your library account</p>
      </div>

      {% if error %}
      <div class="alert alert-error" role="alert">
        <span>{{ error }}</span>
        <button class="alert-dismiss" onclick="this.parentElement.remove()" aria-label="Dismiss">&times;</button>
      </div>
      {% endif %}

      <form method="POST" action="/login" id="login-form">
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <input
            type="text"
            name="username"
            id="username"
            class="form-input"
            placeholder="Enter your username"
            value="{{ username or '' }}"
            required
            autocomplete="username"
            autofocus
            aria-required="true"
          >
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            name="password"
            id="password"
            class="form-input"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
            aria-required="true"
          >
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block mt-4" id="login-submit">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Create one</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
